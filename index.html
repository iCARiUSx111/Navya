<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEMC Treasure Hunt - Clue #1</title>
    <style>
        :root {
            --brand-dark: #050505;
            --brand-main: #FFD700; /* Gold */
            --brand-blue: #1E90FF; /* Electric Blue for the Nets */
            --brand-text: #ffffff;
            --box-bg: rgba(30, 30, 30, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--brand-dark);
            color: var(--brand-text);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* --- Header --- */
        .cemc-header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: rgba(5, 5, 5, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            border-bottom: 2px solid var(--brand-main);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .cemc-acronym {
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--brand-main);
            letter-spacing: 5px;
        }

        /* --- Meme Section --- */
        .meme-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, rgba(30, 144, 255, 0.15) 0%, rgba(5, 5, 5, 1) 75%);
        }

        .meme-image {
            max-width: 85%;
            max-height: 70vh;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,1);
            border: 2px solid var(--brand-blue);
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--brand-main);
            animation: bounce 2s infinite;
            text-transform: uppercase;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-12px);}
        }

        /* --- Riddle Section --- */
        .text-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.1) 0%, rgba(5, 5, 5, 1) 80%);
        }

        .club-logo {
            max-width: 180px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 10px var(--brand-main));
        }

        .text-card {
            background: var(--box-bg);
            backdrop-filter: blur(12px);
            padding: 50px 30px;
            border-radius: 30px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 30px 80px rgba(0,0,0,1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            text-align: center;
        }

        .clue-tag {
            background: linear-gradient(90deg, var(--brand-blue), var(--brand-main));
            color: #000;
            padding: 5px 20px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 25px;
        }

        .riddle-text {
            line-height: 2;
            font-size: 1.4rem;
            color: #ffffff;
            font-weight: 300;
        }

        .highlight-blue {
            color: var(--brand-blue);
            font-weight: 700;
            text-shadow: 0 0 10px rgba(30, 144, 255, 0.5);
        }

        .highlight-gold {
            color: var(--brand-main);
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .final-action {
            margin-top: 40px;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--brand-text);
            background: rgba(255, 215, 0, 0.1);
            padding: 15px 25px;
            border: 2px dashed var(--brand-main);
            display: inline-block;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="cemc-header">
        <div class="cemc-acronym">CEMC</div>
    </div>

    <div class="meme-container">
        <img src="https://i.postimg.cc/3RBRcL85/Navya.jpg" alt="Meme" class="meme-image">
        <div class="scroll-hint">↓ TAKE THE SHOT ↓</div>
    </div>

    <div class="text-section">
        <img src="https://i.postimg.cc/fTYYLyFW/CEMC_final.png" alt="CEMC Logo" class="club-logo">

        <div class="text-card">
            <span class="clue-tag">#CLUE 01</span>
            
            <p class="riddle-text">
                Look for the place where the <span class="highlight-gold">hoops</span> have no doors 
                and the <span class="highlight-blue">nets</span> have no fish. 

                Your next prize is waiting where you go to <span class="highlight-gold">sink a swish!</span>
            </p>
            
            <div class="final-action">
                THE COURT DECLARES THE WINNER. 🏀
            </div>
        </div>
    </div>

</body>
</html>
